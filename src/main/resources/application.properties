spring.application.name=prototipo-reservas

# Configuración de Supabase - Transaction Pooler
spring.datasource.url=jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres.xlvtoslopxmjuqmznxjd
spring.datasource.password=IOC2026RoomyApp

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar prepared statement cache a nivel de Hibernate
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# HikariCP Connection Pool - Aggressive settings for pooler
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=true

# Configuración JWT
jwt.secret=${JWT_SECRET:mi_clave_super_secreta_que_debe_tener_minimo_256_bits_para_HS256}
jwt.expiration=604800000

