spring.application.name=RoomyApp

# Configuración de Supabase - Transaction Pooler con reset de conexiones
spring.datasource.url=jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres.xlvtoslopxmjuqmznxjd
spring.datasource.password=IOC2026RoomyApp

# DataSource properties para deshabilitar prepared statements a nivel driver
spring.datasource.hikari.data-source-properties.defaultFetchSize=50
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMB=0

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false
spring.jpa.properties.hibernate.generate_statistics=false

# HikariCP - Pool de conexiones optimizado
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1

# Configuración JWT con expiración variable dependiendo del caso
jwt.secret=${JWT_SECRET:mi_clave_super_secreta_que_debe_tener_minimo_256_bits_para_HS256}
jwt.expiration=86400000
jwt.remember.expiration=604800000
